<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="カタカナ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>カタカナれんしゅう</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:#f0f4ff}
.screen{display:none;width:100%;height:100%;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* Home */
#home{justify-content:center;gap:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
#home h1{font-size:48px;color:#fff;text-shadow:2px 4px 8px rgba(0,0,0,.2)}
#home .subtitle{font-size:20px;color:rgba(255,255,255,.85);margin-top:-8px}
.menu-btn{width:280px;padding:16px;border:none;border-radius:16px;font-size:21px;font-weight:700;cursor:pointer;transition:transform .15s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.menu-btn:active{transform:scale(.96)}
.btn-practice{background:#48dbfb;color:#333}
.btn-test{background:#ff6b6b;color:#fff}

/* Level Select */
#levelSelect{background:#f0f4ff;padding:20px;padding-top:env(safe-area-inset-top,20px);overflow-y:auto}
#levelSelect h2{font-size:26px;color:#333;margin-bottom:6px}
.level-desc{font-size:15px;color:#666;margin-bottom:16px}
.mode-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.mode-tab{padding:10px 20px;border:2px solid #667eea;background:#fff;color:#667eea;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}
.mode-tab.active{background:#667eea;color:#fff}
.level-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;width:100%;max-width:600px}
.level-card{aspect-ratio:1;border:none;border-radius:14px;font-size:32px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:transform .12s;box-shadow:0 2px 8px rgba(0,0,0,.1);position:relative;color:#fff}
.level-card:active{transform:scale(.93)}
.level-card .label{font-size:11px;font-weight:500}
.back-btn{margin-top:16px;padding:10px 28px;border:2px solid #667eea;background:#fff;color:#667eea;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}

/* Test Select */
#testSelect{background:#f0f4ff;padding:20px;padding-top:env(safe-area-inset-top,20px);overflow-y:auto;gap:16px}
#testSelect h2{font-size:26px;color:#333}
.test-desc{font-size:15px;color:#666;text-align:center;max-width:320px}
.test-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:400px}
.test-card{padding:20px 16px;border:none;border-radius:16px;font-size:18px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .12s;box-shadow:0 2px 10px rgba(0,0,0,.1);color:#fff}
.test-card:active{transform:scale(.93)}
.test-card .test-emoji{font-size:36px}
.test-badge{font-size:12px;padding:3px 10px;border-radius:8px;background:rgba(255,255,255,.3);margin-top:4px}

/* Game */
#game{background:#f0f4ff;padding:12px;padding-top:env(safe-area-inset-top,12px)}
.game-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:600px;margin-bottom:4px}
.game-header .back-arrow{font-size:26px;cursor:pointer;color:#667eea;background:none;border:none;padding:6px}
.game-header .progress{font-size:15px;color:#666}
.game-header .stars{font-size:20px;color:#feca57}
.test-score{font-size:15px;font-weight:700;padding:4px 12px;border-radius:8px}
.test-score.passing{background:#00b894;color:#fff}
.test-score.failing{background:#ff6b6b;color:#fff}

.game-prompt{font-size:22px;color:#333;margin-bottom:4px;font-weight:600}
.game-target{font-size:72px;color:#667eea;font-weight:700;line-height:1.1;margin-bottom:4px}
.game-target.word{font-size:44px;letter-spacing:6px}
.game-reading{font-size:16px;color:#999;margin-bottom:8px}

.canvas-area{position:relative;width:min(85vw,380px);height:min(85vw,380px);margin:0 auto}
.canvas-area.word-mode{width:min(95vw,560px);height:min(45vw,220px)}
.canvas-bg{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:18px;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.canvas-guide{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:18px;pointer-events:none;z-index:1}
#drawCanvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:18px;z-index:2;touch-action:none}

.game-buttons{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.game-btn{padding:12px 24px;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;transition:transform .12s}
.game-btn:active{transform:scale(.94)}
.btn-clear{background:#dfe6e9;color:#636e72}
.btn-check{background:#00b894;color:#fff;box-shadow:0 3px 10px rgba(0,184,148,.3)}
.btn-hint{background:#fdcb6e;color:#333}
.btn-next{background:#667eea;color:#fff;box-shadow:0 3px 10px rgba(102,126,234,.3)}
.btn-skip{background:#a29bfe;color:#fff}

/* Overlay */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center}
.overlay.active{display:flex}
.result-card{background:#fff;border-radius:24px;padding:36px;text-align:center;max-width:340px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.result-card .emoji{font-size:64px}
.result-card h3{font-size:26px;margin:10px 0 6px;color:#333}
.result-card p{font-size:15px;color:#666;margin-bottom:16px;white-space:pre-line}
.result-card button{padding:12px 28px;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;background:#667eea;color:#fff}

/* Complete */
#complete{justify-content:center;gap:16px;background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)}
#complete h2{font-size:34px;color:#fff}
#complete .final-stars{font-size:44px}
#complete p{font-size:17px;color:rgba(255,255,255,.9);text-align:center;padding:0 20px}

/* Test Result */
#testResult{justify-content:center;gap:20px;padding:20px}
#testResult .result-big{font-size:80px}
#testResult h2{font-size:34px}
#testResult .score-detail{font-size:20px;color:#555}
.pass-bg{background:linear-gradient(135deg,#00b894 0%,#00cec9 100%)}
.fail-bg{background:linear-gradient(135deg,#fd79a8 0%,#e17055 100%)}
#testResult h2,#testResult p,#testResult .score-detail{color:#fff}
.wrong-list{max-height:200px;overflow-y:auto;background:rgba(255,255,255,.2);border-radius:12px;padding:12px;margin:0 20px;text-align:left;color:#fff;font-size:15px;width:90%;max-width:400px}
.wrong-list div{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.2)}

@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-200px) rotate(720deg);opacity:0}}
.bounce-in{animation:bounceIn .5s ease-out}
.confetti-particle{position:fixed;width:10px;height:10px;border-radius:50%;z-index:200;animation:confetti 1.5s ease-out forwards;pointer-events:none}

/* Kanji Sentence (縦書き) */
.kanji-sentence-area{display:none;justify-content:center;align-items:flex-start;width:100%;margin:8px auto 0;flex:1;padding:8px}
.kanji-sentence-area.active{display:flex}
.vcol{display:flex;flex-direction:column;align-items:center;gap:8px;padding:22px 56px;background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.08);min-height:280px}
.vchar{font-size:42px;font-family:'Hiragino Mincho ProN','YuMincho','Yu Mincho',serif;line-height:1.15;color:#333;position:relative;text-align:center}
.vchar.target{color:#e74c3c;font-weight:700}
/* 読みテスト: 対象行を横並び（漢字 + 手書きスロット + 正解）にする */
.vchar.target.read-target{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:12px;min-height:0}
.vchar.target.read-target .kchar{font-size:52px;color:#e74c3c;font-weight:700;line-height:1;font-family:'Hiragino Mincho ProN','YuMincho',serif}
.vchar.target .rslots{display:flex;flex-direction:column;gap:4px}
.vchar.target .rslot{width:56px;height:56px;border:2px dashed #667eea;border-radius:10px;background:#fafcff;position:relative;flex-shrink:0}
.vchar.target .rslot canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;border-radius:8px}
.vchar.target .read-ans{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:38px;color:#e74c3c;font-weight:700;line-height:1.1;font-family:'Hiragino Sans',sans-serif}
.vslot{width:110px;height:110px;border:3px dashed #667eea;border-radius:14px;background:#fafcff;position:relative;margin:4px 0;flex-shrink:0}
.vslot canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;border-radius:12px}
.vslot .slot-side{position:absolute;left:100%;top:50%;transform:translateY(-50%);margin-left:14px;display:flex;flex-direction:row;align-items:flex-start;gap:10px}
.vslot .slot-side .col{display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.1}
.vslot .slot-side .furigana{font-size:24px;color:#666;font-family:'Hiragino Sans',sans-serif;font-weight:600}
.vslot .slot-side .answer{font-size:56px;color:#e74c3c;font-weight:700;font-family:'Hiragino Mincho ProN','YuMincho',serif;line-height:1}
</style>
</head>
<body>

<!-- Home -->
<div id="home" class="screen active">
  <h1>カタカナ</h1>
  <p class="subtitle">れんしゅうしよう！</p>
  <button class="menu-btn btn-practice" onclick="openPractice()">📝 れんしゅうモード</button>
  <button class="menu-btn btn-test" onclick="openTestSelect()">🏆 テストモード</button>
  <button class="menu-btn" style="background:#fdcb6e;color:#333" onclick="openKanjiTest()">✏️ かんじテスト（1ねん）</button>
</div>

<!-- Level Select (Practice) -->
<div id="levelSelect" class="screen">
  <h2 id="levelTitle">れんしゅうモード</h2>
  <p class="level-desc" id="levelDesc"></p>
  <div class="mode-tabs" id="modeTabs"></div>
  <div class="level-grid" id="levelGrid"></div>
  <button class="back-btn" onclick="showScreen('home')">🏠 もどる</button>
</div>

<!-- Test Select -->
<div id="testSelect" class="screen">
  <h2>🏆 テストモード</h2>
  <p class="test-desc">20もん中 18もん せいかいで ごうかく！</p>
  <div class="test-grid" id="testGrid"></div>
  <button class="back-btn" onclick="showScreen('home')">🏠 もどる</button>
</div>

<!-- Kanji Test Select -->
<div id="kanjiTestSelect" class="screen">
  <h2>✏️ かんじテスト（1ねん）</h2>
  <p class="test-desc">1ねんせいの かんじ 80もんから しゅつだい<br>20もん中 18もん せいかいで ごうかく！</p>
  <div class="test-grid">
    <button class="test-card" style="background:#74b9ff" onclick="startKanjiTest('kanji-read')"><span class="test-emoji">👀</span>よみテスト<span class="test-badge">20もん</span></button>
    <button class="test-card" style="background:#fd79a8" onclick="startKanjiTest('kanji-write')"><span class="test-emoji">✏️</span>かきテスト<span class="test-badge">20もん</span></button>
  </div>
  <button class="back-btn" onclick="showScreen('home')">🏠 もどる</button>
</div>

<!-- Game -->
<div id="game" class="screen">
  <div class="game-header">
    <button class="back-arrow" onclick="exitGame()">←</button>
    <span class="progress" id="progress"></span>
    <span class="stars" id="starsDisplay"></span>
    <span class="test-score" id="testScoreDisplay" style="display:none"></span>
  </div>
  <p class="game-prompt" id="gamePrompt"></p>
  <div class="game-target" id="gameTarget"></div>
  <p class="game-reading" id="gameReading"></p>
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-bg"></div>
    <canvas class="canvas-guide" id="guideCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
  </div>
  <div class="kanji-sentence-area" id="kanjiSentenceArea">
    <div class="vcol" id="kanjiVcol"></div>
  </div>
  <div class="game-buttons" id="gameButtons">
    <button class="game-btn btn-clear" id="clearBtn" onclick="clearCanvas()">けす</button>
    <button class="game-btn btn-hint" id="hintBtn" onclick="showHint()">ヒント</button>
    <button class="game-btn btn-check" id="checkBtn" onclick="checkAnswer()">できた！</button>
    <button class="game-btn btn-next" id="nextBtn" onclick="nextQuestion()" style="display:none">つぎへ →</button>
    <button class="game-btn btn-skip" id="skipBtn" onclick="skipQuestion()" style="display:none">スキップ</button>
  </div>
</div>

<!-- Result Overlay -->
<div class="overlay" id="resultOverlay">
  <div class="result-card bounce-in">
    <div class="emoji" id="resultEmoji"></div>
    <h3 id="resultTitle"></h3>
    <p id="resultMsg"></p>
    <button id="resultBtn" onclick="closeResult()">OK</button>
  </div>
</div>

<!-- Practice Complete -->
<div id="complete" class="screen">
  <div style="font-size:80px">🎉</div>
  <h2>すごい！クリア！</h2>
  <div class="final-stars" id="finalStars"></div>
  <p id="finalMsg"></p>
  <button class="menu-btn" style="background:#fff;color:#764ba2" onclick="showScreen('home')">🏠 ホームにもどる</button>
</div>

<!-- Test Result -->
<div id="testResult" class="screen">
  <div class="result-big" id="testResultEmoji"></div>
  <h2 id="testResultTitle"></h2>
  <p class="score-detail" id="testResultScore"></p>
  <div class="wrong-list" id="wrongList" style="display:none"></div>
  <button class="menu-btn" style="background:#fff;color:#333" onclick="showScreen('home')">🏠 ホームにもどる</button>
  <button class="menu-btn" style="background:rgba(255,255,255,.3);color:#fff;border-color:rgba(255,255,255,.5)" id="retryBtn" onclick="retryTest()">🔄 もういちど</button>
</div>

const WORD_LEVELS = [

// インラインの⬜キャンバスに描画する（複数キャンバス対応）
function setupSlotCanvas(cv) {
  const rect = cv.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cv.width = Math.max(1, Math.round(rect.width * dpr));
  cv.height = Math.max(1, Math.round(rect.height * dpr));
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#333';
  cv.__ctx = ctx;
  let drawing = false, lastX = 0, lastY = 0;
  cv.onpointerdown = (e) => {
    e.preventDefault();
    drawing = true;
    const r = cv.getBoundingClientRect();
    lastX = e.clientX - r.left;
    lastY = e.clientY - r.top;
    if (e.pressure > 0) ctx.lineWidth = Math.max(2, Math.min(8, e.pressure * 8));
  };
  cv.onpointermove = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const r = cv.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;
    if (e.pressure > 0) ctx.lineWidth = Math.max(2, Math.min(8, e.pressure * 8));
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
    lastX = x; lastY = y;
  };
  cv.onpointerup = cv.onpointercancel = () => { drawing = false; };
}
function setupAllSlots() {
  document.querySelectorAll('#kanjiVcol canvas').forEach(cv => setupSlotCanvas(cv));
}
function clearAllSlotCanvases() {
  document.querySelectorAll('#kanjiVcol canvas').forEach(cv => {
    if (cv.__ctx) {
      const dpr = window.devicePixelRatio || 1;
      cv.__ctx.clearRect(0, 0, cv.width / dpr, cv.height / dpr);
    }
  });
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ===== Canvas =====
function initCanvas() {
  const area = document.getElementById('canvasArea');
  const draw = document.getElementById('drawCanvas');
  const guide = document.getElementById('guideCanvas');
  const rect = area.getBoundingClientRect();
  canvasW = rect.width; canvasH = rect.height;
  const dpr = window.devicePixelRatio || 1;
  [draw, guide].forEach(c => {
    c.width = canvasW * dpr; c.height = canvasH * dpr;
    c.style.width = canvasW + 'px'; c.style.height = canvasH + 'px';
  });
  drawCtx = draw.getContext('2d');
  drawCtx.scale(dpr, dpr);
  drawCtx.lineCap = 'round'; drawCtx.lineJoin = 'round';
  drawCtx.lineWidth = 6; drawCtx.strokeStyle = '#333';
  guideCtx = guide.getContext('2d');
  guideCtx.scale(dpr, dpr);
  draw.onpointerdown = onPointerDown;
  draw.onpointermove = onPointerMove;
  draw.onpointerup = draw.onpointercancel = onPointerUp;
}

function getPos(e) { const r = e.target.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
function onPointerDown(e) {
  e.preventDefault(); isDrawing = true;
  const p = getPos(e); lastX = p.x; lastY = p.y; currentStroke = [p];
  if (e.pressure > 0) drawCtx.lineWidth = Math.max(3, Math.min(12, e.pressure * 12));
}
function onPointerMove(e) {
  if (!isDrawing) return; e.preventDefault();
  const p = getPos(e);
  if (e.pressure > 0) drawCtx.lineWidth = Math.max(3, Math.min(12, e.pressure * 12));
  drawCtx.beginPath(); drawCtx.moveTo(lastX, lastY); drawCtx.lineTo(p.x, p.y); drawCtx.stroke();
  lastX = p.x; lastY = p.y; currentStroke.push(p);
}
function onPointerUp() {
  if (!isDrawing) return; isDrawing = false;
  if (currentStroke.length > 1) strokes.push([...currentStroke]);
  currentStroke = [];
}
function clearCanvas() {
  if (currentMode === 'kanji-write' || currentMode === 'kanji-read') {
    clearAllSlotCanvases();
    return;
  }
  drawCtx.clearRect(0, 0, canvasW, canvasH); strokes = []; currentStroke = [];
}

// ===== Guide =====
function drawGuide(char, opacity) {
  guideCtx.clearRect(0, 0, canvasW, canvasH);
  guideCtx.strokeStyle = 'rgba(200,200,220,0.4)'; guideCtx.lineWidth = 1; guideCtx.setLineDash([8,8]);
  guideCtx.beginPath();
  guideCtx.moveTo(canvasW/2, 0); guideCtx.lineTo(canvasW/2, canvasH);
  guideCtx.moveTo(0, canvasH/2); guideCtx.lineTo(canvasW, canvasH/2);
  guideCtx.stroke(); guideCtx.setLineDash([]);
  if (opacity > 0) {
    guideCtx.fillStyle = `rgba(102,126,234,${opacity})`;
    guideCtx.textAlign = 'center'; guideCtx.textBaseline = 'middle';
    guideCtx.font = `bold ${canvasW * 0.7}px 'Hiragino Sans', sans-serif`;
    guideCtx.fillText(char, canvasW/2, canvasH/2);
  }
}

function drawWordGuide(word, opacity) {
  guideCtx.clearRect(0, 0, canvasW, canvasH);
  const n = word.length, cw = canvasW / n;
  guideCtx.strokeStyle = 'rgba(200,200,220,0.3)'; guideCtx.lineWidth = 1; guideCtx.setLineDash([6,6]);
  for (let i = 0; i < n; i++) {
    if (i > 0) { guideCtx.beginPath(); guideCtx.moveTo(cw*i,0); guideCtx.lineTo(cw*i,canvasH); guideCtx.stroke(); }
    guideCtx.beginPath();
    guideCtx.moveTo(cw*i+cw/2,0); guideCtx.lineTo(cw*i+cw/2,canvasH);
    guideCtx.moveTo(cw*i,canvasH/2); guideCtx.lineTo(cw*(i+1),canvasH/2);
    guideCtx.stroke();
  }
  guideCtx.setLineDash([]);
  if (opacity > 0) {
    guideCtx.fillStyle = `rgba(102,126,234,${opacity})`;
    guideCtx.textAlign = 'center'; guideCtx.textBaseline = 'middle';
    const fs = Math.min(cw * 0.7, canvasH * 0.6);
    guideCtx.font = `bold ${fs}px 'Hiragino Sans', sans-serif`;
    for (let i = 0; i < n; i++) guideCtx.fillText(word[i], cw*i + cw/2, canvasH/2);
  }
}

function loadQuestion() {
  if (drawCtx) clearCanvas();
  hintUsed = false;
  const q = currentChars[currentCharIdx];

  document.getElementById('progress').textContent = `${currentCharIdx+1} / ${total}`;

  document.getElementById('canvasArea').style.display = '';

  // Stars vs Test score display
  const starsEl = document.getElementById('starsDisplay');

  if (isTestMode) {
    starsEl.style.display = 'none';
    scoreEl.style.display = '';
    scoreEl.textContent = `⭕${testCorrect}  ❌${testWrong.length}`;
    scoreEl.className = 'test-score ' + (testCorrect >= testWrong.length ? 'passing' : 'failing');
  } else {
    starsEl.style.display = '';
    scoreEl.style.display = 'none';
    starsEl.textContent = '⭐'.repeat(Math.min(totalStars, 15));
  }

  // Buttons
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('checkBtn').style.display = '';
  document.getElementById('hintBtn').style.display = isTestMode ? 'none' : '';
  document.getElementById('skipBtn').style.display = isTestMode ? '' : 'none';

  const isWord = q.type === 'word';
  document.getElementById('canvasArea').classList.toggle('word-mode', isWord);

  // Kanji reading / writing test: 例文を縦書き表示
  if (currentMode === 'kanji-read' || currentMode === 'kanji-write') {
    kanjiAnswerShown = false;
    document.getElementById('gamePrompt').textContent =
      currentMode === 'kanji-read'
        ? '⬜に よみかたを かこう'
        : '⬜に かんじを かこう';
    document.getElementById('gameTarget').textContent = '';
    document.getElementById('gameTarget').className = 'game-target';
    document.getElementById('gameReading').textContent = '';
    document.getElementById('canvasArea').style.display = 'none';
    document.getElementById('kanjiSentenceArea').classList.add('active');
    renderKanjiSentence(q, currentMode);
    // ボタン: つぎへだけ表示（書きテストはけすも）
    document.getElementById('checkBtn').style.display = 'none';
    document.getElementById('hintBtn').style.display = 'none';
    document.getElementById('skipBtn').style.display = 'none';
    document.getElementById('clearBtn').style.display = '';
    document.getElementById('nextBtn').style.display = '';
    document.getElementById('nextBtn').textContent = 'つぎへ →';
    setTimeout(() => setupAllSlots(), 30);
    return;
  }

  if (isWord) {
    document.getElementById('gamePrompt').textContent = `「${q.reading}」を カタカナで かこう！`;
    document.getElementById('gameTarget').textContent = '';
    document.getElementById('gameTarget').className = 'game-target word';
    document.getElementById('gameReading').textContent = '';
  } else if (isTestMode || currentMode === 'quiz') {
    document.getElementById('gamePrompt').textContent = 'カタカナで かこう！';
    document.getElementById('gameTarget').textContent = q.reading;
    document.getElementById('gameTarget').className = 'game-target';
    document.getElementById('gameReading').textContent = '';
  } else if (currentMode === 'trace') {
    document.getElementById('gamePrompt').textContent = 'なぞって かこう！';
    document.getElementById('gameTarget').textContent = '';
    document.getElementById('gameTarget').className = 'game-target';
    document.getElementById('gameReading').textContent = q.reading;
    document.getElementById('hintBtn').style.display = 'none';
  } else if (currentMode === 'copy') {
    document.getElementById('gamePrompt').textContent = 'おなじように かこう！';
    document.getElementById('gameTarget').textContent = q.char;
    document.getElementById('gameTarget').className = 'game-target';
    document.getElementById('gameReading').textContent = q.reading;
  }

  setTimeout(() => {
    initCanvas();
    setTimeout(() => {
      const q2 = currentChars[currentCharIdx];
      if (q2.type === 'word') drawWordGuide(q2.char, 0);
      else if (currentMode === 'trace') drawGuide(q2.char, 0.2);
      else drawGuide(q2.char, 0);
    }, 20);
  }, 10);
}

// ===== Check Answer =====
function checkAnswer() {
  // 漢字モードは判定しない
  if (currentMode === 'kanji-read' || currentMode === 'kanji-write') return;
  const dpr = window.devicePixelRatio || 1;
  const pixels = drawCtx.getImageData(0, 0, canvasW*dpr, canvasH*dpr).data;
  let filled = 0;
  for (let i = 3; i < pixels.length; i += 4) if (pixels[i] > 30) filled++;
  const ratio = filled / (canvasW*dpr*canvasH*dpr);

  if (strokes.length === 0 || ratio < 0.005) {
    showResult('🤔', 'まだ かけてないよ', 'もじを かいてみよう！', false);
    return;
  }

  if (isTestMode) {
    checkTestAnswer();
  } else {
    checkPracticeAnswer(ratio);
  }
}

function checkPracticeAnswer(ratio) {
  const q = currentChars[currentCharIdx];
  if (currentMode === 'trace') {
    const coverage = checkOverlap(q);
    if (coverage < 0.15) {
      showResult('💪', 'もう いちど！', 'もじの うえを なぞってね', false);
      return;
    }
    const stars = hintUsed ? 1 : (coverage > 0.5 ? 3 : coverage > 0.3 ? 2 : 1);
    totalStars += stars;
    const titles = ['がんばったね！','いいね！','すばらしい！'];
    const emojis = ['😊','🎉','🌟'];
    showResult(emojis[stars-1], titles[stars-1], '⭐'.repeat(stars), true);
    spawnConfetti();
  } else {
    const ranked = recognizeChar();
    const rank = ranked.findIndex(r => r.char === q.char);
    const topCorr = ranked[0] ? ranked[0].corr : 0;
    if (rank < 0 || rank > 4 || topCorr < 0.10) {
      const guessed = ranked[0] ? ranked[0].char : '?';
      showResult('💪', 'もう いちど！', `「${guessed}」に みえるよ…\n「${q.char}」を かいてね`, false);
      return;
    }
    const stars = hintUsed ? 1 : (rank === 0 ? 3 : rank <= 1 ? 2 : 1);
    totalStars += stars;
    const titles = ['がんばったね！','いいね！','すばらしい！'];
    const emojis = ['😊','🎉','🌟'];
    showResult(emojis[stars-1], titles[stars-1], '⭐'.repeat(stars), true);
    spawnConfetti();
  }
}

function checkTestAnswer() {
  const q = currentChars[currentCharIdx];
  const result = recognizeChar();
  // Test mode: correct char must be in top 3 matches AND have min correlation
  const rank = result.findIndex(r => r.char === q.char);
  const topCorr = result[0] ? result[0].corr : 0;
  if (rank >= 0 && rank <= 2 && topCorr >= 0.15) {
    testCorrect++;
    showResult('⭕', 'せいかい！', `「${q.char}」`, true);
    spawnConfetti();
  } else {
    testWrong.push(q);
    const guessed = result[0] ? result[0].char : '?';
    showResult('❌', 'ざんねん…', `こたえは「${q.char}」\n（「${guessed}」に みえたよ）`, true);
  }
}

// Recognize: compare drawing against ALL katakana using raw bitmap correlation
function recognizeChar() {
  const drawBM = getDrawingBitmap(RECOG_SIZE);
  const drawInk = drawBM.reduce((a,b) => a+b, 0);
  if (drawInk < RECOG_SIZE * 0.3) return [];

  const allChars = KATAKANA_GROUPS.flatMap(g => g.chars.map(c => c[0]));
  const scores = allChars.map(c => {
    const refBM = getCharBitmap(c, 'char');
    return { char: c, corr: pearsonCorr(refBM, drawBM) };
  });
  scores.sort((a,b) => b.corr - a.corr);
  return scores;
}

// Cache for reference bitmaps
let _charBMCache = {};
let _bmCacheAspect = 0;
function getCharBitmap(char, type) {
  const aspect = Math.round(canvasW / canvasH * 100);
  if (aspect !== _bmCacheAspect) { _charBMCache = {}; _bmCacheAspect = aspect; }
  if (_charBMCache[char]) return _charBMCache[char];
  const bm = renderCharBitmap(char, type, RECOG_SIZE);
  _charBMCache[char] = bm;
  return bm;
}

function skipQuestion() {
  const q = currentChars[currentCharIdx];
  testWrong.push(q);
  showResult('⏭', 'スキップ', `こたえは「${q.char}」`, true);
}

function checkOverlap(q) {
  const dpr = window.devicePixelRatio || 1;
  const tmp = document.createElement('canvas');
  tmp.width = canvasW*dpr; tmp.height = canvasH*dpr;
  const ctx = tmp.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${canvasW*0.7}px 'Hiragino Sans', sans-serif`;
  ctx.fillText(q.char, canvasW/2, canvasH/2);
  const gd = ctx.getImageData(0,0,canvasW*dpr,canvasH*dpr).data;
  const dd = drawCtx.getImageData(0,0,canvasW*dpr,canvasH*dpr).data;
  let gp = 0, ov = 0;
  for (let i = 3; i < gd.length; i += 16) {
    if (gd[i] > 30) { gp++; if (dd[i] > 30) ov++; }
  }
  return gp > 0 ? ov / gp : 0;
}

// ====== Character Recognition Engine ======
// 32x32 bitmap correlation with dilation for pen stroke matching
const RECOG_SIZE = 32;

// Get user's drawing as a dilated (thickened) bitmap
function getDrawingBitmap(size) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvasW * dpr, h = canvasH * dpr;
  const srcData = drawCtx.getImageData(0, 0, w, h).data;

  // First downsample to size x size
  const raw = new Float32Array(size * size);
  const cellW = w / size, cellH = h / size;
  for (let gy = 0; gy < size; gy++) {
    for (let gx = 0; gx < size; gx++) {
      let sum = 0, count = 0;
      const x0 = Math.floor(gx*cellW), x1 = Math.floor((gx+1)*cellW);
      const y0 = Math.floor(gy*cellH), y1 = Math.floor((gy+1)*cellH);
      for (let y = y0; y < y1; y += 2) {
        for (let x = x0; x < x1; x += 2) {
          sum += srcData[(y*w+x)*4+3];
          count++;
        }
      }
      raw[gy*size+gx] = count > 0 ? sum/count/255 : 0;
    }
  }

  // Dilate: expand each pixel to its neighbors (3x3 max filter)
  // This thickens pen strokes to better match font width
  const dilated = new Float32Array(size * size);
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      let maxVal = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const ny = y+dy, nx = x+dx;
          if (ny >= 0 && ny < size && nx >= 0 && nx < size) {
            maxVal = Math.max(maxVal, raw[ny*size+nx]);
          }
        }
      }
      dilated[y*size+x] = maxVal;
    }
  }
  return dilated;
}

// Render reference character to bitmap (same aspect ratio as canvas)
function renderCharBitmap(char, type, size) {
  // Use actual canvas aspect ratio so bitmaps are comparable
  const aspect = canvasW / canvasH;
  const RW = aspect >= 1 ? 200 : Math.round(200 * aspect);
  const RH = aspect >= 1 ? Math.round(200 / aspect) : 200;
  const tmp = document.createElement('canvas');
  tmp.width = RW; tmp.height = RH;
  const ctx = tmp.getContext('2d');
  ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  if (type === 'word') {
    const n = char.length, cw = RW / n;
    const fs = Math.min(cw * 0.7, RH * 0.6);
    ctx.font = `bold ${fs}px 'Hiragino Sans', sans-serif`;
    for (let i = 0; i < n; i++) ctx.fillText(char[i], cw*i+cw/2, RH/2);
  } else {
    const fs = Math.min(RW, RH) * 0.7;
    ctx.font = `bold ${fs}px 'Hiragino Sans', sans-serif`;
    ctx.fillText(char, RW/2, RH/2);
  }

  const srcData = ctx.getImageData(0,0,RW,RH).data;
  const bm = new Float32Array(size*size);
  const cw2 = RW/size, ch2 = RH/size;
  for (let gy = 0; gy < size; gy++) {
    for (let gx = 0; gx < size; gx++) {
      let s = 0, c = 0;
      for (let y = Math.floor(gy*ch2); y < Math.floor((gy+1)*ch2); y++) {
        for (let x = Math.floor(gx*cw2); x < Math.floor((gx+1)*cw2); x++) {
          s += srcData[(y*RW+x)*4+3]; c++;
        }
      }
      bm[gy*size+gx] = c > 0 ? s/c/255 : 0;
    }
  }
  return bm;
}

// Pearson correlation
function pearsonCorr(a, b) {
  const n = a.length;
  let sA = 0, sB = 0;
  for (let i = 0; i < n; i++) { sA += a[i]; sB += b[i]; }
  const mA = sA/n, mB = sB/n;
  let num = 0, dA = 0, dB = 0;
  for (let i = 0; i < n; i++) {
    const da = a[i]-mA, db = b[i]-mB;
    num += da*db; dA += da*da; dB += db*db;
  }
  const den = Math.sqrt(dA*dB);
  return den > 0 ? num/den : 0;
}

// ===== Results =====
function showResult(emoji, title, msg, success) {
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultOverlay').classList.add('active');
  const card = document.querySelector('.result-card');
  card.classList.remove('bounce-in'); void card.offsetWidth; card.classList.add('bounce-in');
  if (success) {
    document.getElementById('resultBtn').onclick = () => {
      closeResult();
      document.getElementById('checkBtn').style.display = 'none';
      document.getElementById('hintBtn').style.display = 'none';
      document.getElementById('skipBtn').style.display = 'none';
      document.getElementById('nextBtn').style.display = '';
      const q = currentChars[currentCharIdx];
      if (q.type === 'word') drawWordGuide(q.char, 0.15);
      else drawGuide(q.char, 0.15);
    };
  } else {
    document.getElementById('resultBtn').onclick = closeResult;
  }
}

function closeResult() { document.getElementById('resultOverlay').classList.remove('active'); }

function spawnConfetti() {
  const colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#00b894','#6c5ce7','#fd79a8'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-particle';
    el.style.left = (20 + Math.random()*60) + 'vw';
    el.style.top = (40 + Math.random()*30) + 'vh';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDelay = (Math.random()*.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// ===== Next / Complete =====
function nextQuestion() {
  // 漢字モード: 1回目=答え表示、2回目=次の問題
  if (currentMode === 'kanji-read' || currentMode === 'kanji-write') {
    if (!kanjiAnswerShown) {
      kanjiAnswerShown = true;
      revealKanjiAnswer(currentChars[currentCharIdx], currentMode);
      // 答え表示後は けすボタンを隠す
      document.getElementById('clearBtn').style.display = 'none';
      return;
    }
    // 2回目: 次の問題へ
    currentCharIdx++;
    if (currentCharIdx >= currentChars.length) {
      showKanjiComplete();
      return;
    }
    loadQuestion();
    return;
  }
  currentCharIdx++;
  if (currentCharIdx >= currentChars.length) {
    if (isTestMode) showTestResult();
    else showPracticeComplete();
    return;
  }
  loadQuestion();
}

function showKanjiComplete() {
  document.getElementById('finalStars').textContent = '✏️';
  document.getElementById('finalMsg').textContent = '20もん ぜんぶ おわったよ！\nおつかれさま！';
  const h2 = document.querySelector('#complete h2');
  if (h2) h2.textContent = 'おつかれさま！';
  showScreen('complete');
}

function showPracticeComplete() {
  const h2 = document.querySelector('#complete h2');
  if (h2) h2.textContent = 'すごい！クリア！';
  document.getElementById('finalStars').textContent = '⭐'.repeat(Math.min(totalStars, 20));
  const max = currentChars.length * 3;
  const pct = Math.round(totalStars / max * 100);
  let msg = pct >= 80 ? 'パーフェクト！🎊' : pct >= 50 ? 'よくがんばったね！💪' : 'つぎは もっと がんばろう！😊';
  document.getElementById('finalMsg').textContent = `${totalStars} / ${max} ⭐  ${msg}`;
  showScreen('complete');
}

function showTestResult() {
  const passed = testCorrect >= 18;
  const screen = document.getElementById('testResult');
  screen.className = 'screen active ' + (passed ? 'pass-bg' : 'fail-bg');

  document.getElementById('testResultEmoji').textContent = passed ? '🎊' : '😢';
  document.getElementById('testResultTitle').textContent = passed ? 'ごうかく！' : 'もう すこし…';
  document.getElementById('testResultScore').textContent = `${testCorrect} / 20 せいかい（ごうかく：18もん）`;

  const wrongEl = document.getElementById('wrongList');
  if (testWrong.length > 0) {
    wrongEl.style.display = '';
    wrongEl.innerHTML = '<div style="font-weight:700;margin-bottom:6px">まちがえた もじ：</div>' +
      testWrong.map(q => `<div>${q.char}（${q.reading}）</div>`).join('');
  } else {
    wrongEl.style.display = 'none';
  }

  showScreen('testResult');
  if (passed) spawnConfetti();
}

function retryTest() {
  if (!lastTestConfig) return;
  if (lastTestConfig === 'kanji-read' || lastTestConfig === 'kanji-write') {
    startKanjiTest(lastTestConfig);
  } else {
    startTest(lastTestConfig);
  }
}

function exitGame() {
  if (currentMode === 'kanji-read' || currentMode === 'kanji-write') showScreen('kanjiTestSelect');
  else if (isTestMode) openTestSelect();
  else openPractice();
}
